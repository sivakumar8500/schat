name: model
description: A Freezed model brick.

version: 0.1.0+1

environment:
  mason: ^0.1.2

vars:
  name:
    type: string
    description: Model name
    prompt: What is the model name?
  fields:
    type: list
    description: List of fields (e.g. String name, int age)
    prompt: Add fields?
