name: 🚀 Release — Build Android & iOS

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: true
        default: '1.0.0'
      android_build_number:
        description: 'Android build number (versionCode)'
        required: false
        default: ''
      ios_build_number:
        description: 'iOS build number (CFBundleVersion)'
        required: false
        default: ''
      release_notes:
        description: 'Release notes / changelog'
        required: false
        default: 'New release'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build Android APK + AAB
  # ─────────────────────────────────────────────────────────────────────────────
  build-android:
    name: 🤖 Android (APK + AAB)
    runs-on: ubuntu-latest

    outputs:
      apk_path: ${{ steps.collect.outputs.apk_path }}
      aab_path: ${{ steps.collect.outputs.aab_path }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: 🐦 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 pub get
        run: flutter pub get

      - name: ⚙️ Code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🔑 Configure keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
            echo "SIGNING=true" >> $GITHUB_ENV
            echo "✅ Keystore ready"
          else
            echo "SIGNING=false" >> $GITHUB_ENV
            echo "⚠️  Using debug signing"
          fi

      - name: 🔢 Set version
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION="${VERSION#v}"  # strip leading 'v'
          BUILD_NUM=${{ github.event.inputs.android_build_number || github.run_number }}

          echo "Building version: $VERSION+$BUILD_NUM"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUM" >> $GITHUB_ENV

      - name: 🔨 Build APK (split ABI)
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ env.BUILD_NUMBER }} \
            --obfuscate \
            --split-debug-info=build/debug-info/

      - name: 📦 Build AAB
        run: |
          flutter build appbundle \
            --release \
            --build-name=${{ env.APP_VERSION }} \
            --build-number=${{ env.BUILD_NUMBER }} \
            --obfuscate \
            --split-debug-info=build/debug-info/

      - name: 📁 Collect & rename artifacts
        id: collect
        run: |
          mkdir -p dist/android
          VERSION=${{ env.APP_VERSION }}

          # APK files
          for apk in build/app/outputs/flutter-apk/*.apk; do
            base=$(basename "$apk" .apk)
            cp "$apk" "dist/android/schat-v${VERSION}-${base}.apk"
          done

          # AAB file
          aab=$(find build/app/outputs/bundle/release/ -name "*.aab" | head -1)
          cp "$aab" "dist/android/schat-v${VERSION}-release.aab"

          echo "=== Android artifacts ==="
          ls -lh dist/android/
          echo "apk_path=dist/android" >> $GITHUB_OUTPUT
          echo "aab_path=dist/android" >> $GITHUB_OUTPUT

      - name: ⬆️ Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.APP_VERSION }}-${{ github.sha }}
          path: dist/android/
          retention-days: 90

      - name: ⬆️ Upload Android debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-symbols-${{ github.sha }}
          path: build/debug-info/
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build iOS IPA
  # ─────────────────────────────────────────────────────────────────────────────
  build-ios:
    name: 🍎 iOS (IPA)
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: 🐦 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 🗂️ Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: 📦 pub get
        run: flutter pub get

      - name: ⚙️ Code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🍫 pod install
        run: cd ios && pod install --repo-update && cd ..

      - name: 🔑 Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$CERTIFICATE_BASE64" ]; then
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            CERT_PATH=$RUNNER_TEMP/build_certificate.p12
            echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
            security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH"

            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
            echo "✅ Signing ready"
          else
            echo "⚠️  No signing secrets — building no-codesign"
          fi

      - name: 🔢 Set version
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION="${VERSION#v}"
          BUILD_NUM=${{ github.event.inputs.ios_build_number || github.run_number }}
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUM" >> $GITHUB_ENV

      - name: 🔨 Build IPA
        env:
          CERT: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            flutter build ipa \
              --release \
              --export-method=development \
              --build-name=${{ env.APP_VERSION }} \
              --build-number=${{ env.BUILD_NUMBER }} \
              --obfuscate \
              --split-debug-info=build/debug-info/
          else
            flutter build ios \
              --release \
              --no-codesign \
              --build-name=${{ env.APP_VERSION }} \
              --build-number=${{ env.BUILD_NUMBER }} \
              --obfuscate \
              --split-debug-info=build/debug-info/
          fi

      - name: 📁 Collect IPA
        run: |
          mkdir -p dist/ios
          VERSION=${{ env.APP_VERSION }}
          ipa=$(find build/ios/ipa/ -name "*.ipa" 2>/dev/null | head -1)
          if [ -n "$ipa" ]; then
            cp "$ipa" "dist/ios/schat-v${VERSION}.ipa"
            echo "=== IPA files ==="
            ls -lh dist/ios/
          else
            echo "No IPA generated (no-codesign build)"
            touch dist/ios/README.txt
            echo "Built without code signing. To generate IPA, configure signing secrets." > dist/ios/README.txt
          fi

      - name: ⬆️ Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ env.APP_VERSION }}-${{ github.sha }}
          path: dist/ios/
          retention-days: 90

      - name: ⬆️ Upload iOS debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-symbols-${{ github.sha }}
          path: build/debug-info/
          retention-days: 90

      - name: 🧹 Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Create GitHub Release (after both builds succeed)
  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: 📦 Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔢 Set version
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION="${VERSION#v}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: ⬇️ Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: android-release-*
          path: release/android/
          merge-multiple: true

      - name: ⬇️ Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ios-release-*
          path: release/ios/
          merge-multiple: true

      - name: 📋 List release files
        run: |
          echo "=== Android ==="
          ls -lh release/android/ 2>/dev/null || echo "(empty)"
          echo "=== iOS ==="
          ls -lh release/ios/ 2>/dev/null || echo "(empty)"

      - name: 🚀 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', env.APP_VERSION) }}
          name: "schat v${{ env.APP_VERSION }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/android/*.apk
            release/android/*.aab
            release/ios/*.ipa
          body: |
            ## 📱 schat v${{ env.APP_VERSION }}

            ${{ github.event.inputs.release_notes || 'New release' }}

            ---

            ### 🤖 Android Downloads
            | File | Description |
            |------|-------------|
            | `*-arm64-v8a.apk` | Modern 64-bit devices (**recommended**) |
            | `*-armeabi-v7a.apk` | Older 32-bit devices |
            | `*-x86_64.apk` | Emulators / x86 devices |
            | `*.aab` | Google Play App Bundle |

            ### 🍎 iOS Downloads
            | File | Description |
            |------|-------------|
            | `*.ipa` | iOS IPA (TestFlight / Ad-Hoc) |

            ---

            Built with Flutter ${{ env.FLUTTER_VERSION }} • Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
