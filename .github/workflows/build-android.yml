name: 🤖 Build Android

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (apk or appbundle)'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - appbundle
          - both

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'
  JAVA_VERSION: '17'

jobs:
  build-android:
    name: Build Android (${{ matrix.build_type }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type:
          - apk
          - appbundle

    steps:
      # ─── Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Java ──────────────────────────────────────────────────────────────
      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # ─── Flutter ───────────────────────────────────────────────────────────
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # ─── Dependencies ──────────────────────────────────────────────────────
      - name: 📦 Get Flutter dependencies
        run: flutter pub get

      # ─── Code Generation ───────────────────────────────────────────────────
      - name: ⚙️ Run build_runner (code generation)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # ─── Static Analysis ───────────────────────────────────────────────────
      - name: 🔍 Analyze project source
        run: flutter analyze --no-fatal-infos

      # ─── Tests ─────────────────────────────────────────────────────────────
      - name: 🧪 Run unit tests
        run: flutter test --coverage

      # ─── Keystore Setup (Release Signing) ──────────────────────────────────
      - name: 🔑 Decode and configure keystore
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding keystore..."
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

            # Create key.properties for signing
            cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
            echo "✅ Keystore configured for release signing"
          else
            echo "⚠️  No keystore secrets found — building with debug signing"
          fi

      # ─── Patch build.gradle for release signing (if keystore exists) ────────
      - name: 🔧 Configure release signing in build.gradle
        if: github.event_name != 'pull_request'
        run: |
          if [ -f android/key.properties ]; then
            # Inject signing config into app/build.gradle.kts
            sed -i 's|signingConfig = signingConfigs.getByName("debug")|signingConfig = signingConfigs.getByName("release")|g' android/app/build.gradle.kts

            # Add release signingConfig block if not present
            python3 - << 'PYEOF'
          import re

          with open("android/app/build.gradle.kts", "r") as f:
              content = f.read()

          signing_block = """
              val keystoreProps = java.util.Properties()
              val keystoreFile = rootProject.file("key.properties")
              if (keystoreFile.exists()) {
                  keystoreFile.inputStream().use { keystoreProps.load(it) }
              }

              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProps["keyAlias"] as String? ?: ""
                      keyPassword = keystoreProps["keyPassword"] as String? ?: ""
                      storeFile = keystoreProps["storeFile"]?.let { file(it as String) }
                      storePassword = keystoreProps["storePassword"] as String? ?: ""
                  }
              }
          """

          if "signingConfigs" not in content:
              content = content.replace("android {", "android {" + signing_block)
              with open("android/app/build.gradle.kts", "w") as f:
                  f.write(content)
              print("✅ Signing config injected")
          else:
              print("ℹ️  Signing config already present, skipping")
          PYEOF
          fi

      # ─── Build APK ─────────────────────────────────────────────────────────
      - name: 🔨 Build APK (release)
        if: matrix.build_type == 'apk'
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info/

      # ─── Build App Bundle (AAB) ────────────────────────────────────────────
      - name: 📦 Build App Bundle (release)
        if: matrix.build_type == 'appbundle'
        run: |
          flutter build appbundle \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info/

      # ─── Collect Artifacts ─────────────────────────────────────────────────
      - name: 📁 Collect APK artifacts
        if: matrix.build_type == 'apk'
        run: |
          mkdir -p artifacts/apk
          find build/app/outputs/flutter-apk/ -name "*.apk" -exec cp {} artifacts/apk/ \;
          echo "=== APK files ==="
          ls -lh artifacts/apk/

      - name: 📁 Collect AAB artifacts
        if: matrix.build_type == 'appbundle'
        run: |
          mkdir -p artifacts/aab
          find build/app/outputs/bundle/release/ -name "*.aab" -exec cp {} artifacts/aab/ \;
          echo "=== AAB files ==="
          ls -lh artifacts/aab/

      # ─── Upload APK ────────────────────────────────────────────────────────
      - name: ⬆️ Upload APK artifact
        if: matrix.build_type == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: artifacts/apk/
          retention-days: 30

      # ─── Upload AAB ────────────────────────────────────────────────────────
      - name: ⬆️ Upload AAB artifact
        if: matrix.build_type == 'appbundle'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: artifacts/aab/
          retention-days: 30

      # ─── Upload Debug Symbols ──────────────────────────────────────────────
      - name: ⬆️ Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-info-${{ matrix.build_type }}-${{ github.sha }}
          path: build/debug-info/
          retention-days: 30

      # ─── GitHub Release (on tag push) ──────────────────────────────────────
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && matrix.build_type == 'apk'
        uses: softprops/action-gh-release@v2
        with:
          name: schat ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/apk/*.apk
          body: |
            ## 📱 schat Android Release ${{ github.ref_name }}

            ### Downloads
            - **APK** (split per ABI for smaller download size)
              - `arm64-v8a` — modern 64-bit devices (recommended)
              - `armeabi-v7a` — older 32-bit devices
              - `x86_64` — emulators / x86 devices

            ### What's Changed
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.sha }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
