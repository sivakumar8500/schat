name: 🍎 Build iOS

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      export_method:
        description: 'IPA export method'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - ad-hoc
          - app-store

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.32.0'
  XCODE_VERSION: '16.2'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      # ─── Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Xcode ─────────────────────────────────────────────────────────────
      - name: 🛠️ Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      # ─── Flutter ───────────────────────────────────────────────────────────
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # ─── CocoaPods cache ───────────────────────────────────────────────────
      - name: 🗂️ Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-

      # ─── Dependencies ──────────────────────────────────────────────────────
      - name: 📦 Get Flutter dependencies
        run: flutter pub get

      # ─── Code Generation ───────────────────────────────────────────────────
      - name: ⚙️ Run build_runner (code generation)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # ─── CocoaPods Install ─────────────────────────────────────────────────
      - name: 🍫 Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # ─── Static Analysis ───────────────────────────────────────────────────
      - name: 🔍 Analyze project source
        run: flutter analyze --no-fatal-infos

      # ─── Tests ─────────────────────────────────────────────────────────────
      - name: 🧪 Run unit tests
        run: flutter test --coverage

      # ─── Code Signing (Certificate + Profile) ──────────────────────────────
      - name: 🔑 Import code signing certificate
        if: github.event_name != 'pull_request'
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$CERTIFICATE_BASE64" ]; then
            echo "Setting up code signing..."

            # Create temp keychain
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            # Decode & import certificate
            CERT_PATH=$RUNNER_TEMP/build_certificate.p12
            echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
            security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH"

            # Decode & install provisioning profile
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

            echo "✅ Code signing configured"
          else
            echo "⚠️  No signing secrets found — building without code signing (simulator only)"
          fi

      # ─── Build iOS (No Codesign for PR) ────────────────────────────────────
      - name: 🔨 Build iOS (no codesign — PR)
        if: github.event_name == 'pull_request'
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --obfuscate \
            --split-debug-info=build/debug-info/

      # ─── Build iOS IPA (Release) ────────────────────────────────────────────
      - name: 🔨 Build iOS IPA (release)
        if: github.event_name != 'pull_request'
        env:
          EXPORT_METHOD: ${{ github.event.inputs.export_method || 'development' }}
        run: |
          flutter build ipa \
            --release \
            --export-method="$EXPORT_METHOD" \
            --obfuscate \
            --split-debug-info=build/debug-info/

      # ─── Collect IPA ───────────────────────────────────────────────────────
      - name: 📁 Collect IPA artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p artifacts/ipa
          find build/ios/ipa/ -name "*.ipa" -exec cp {} artifacts/ipa/ \;
          echo "=== IPA files ==="
          ls -lh artifacts/ipa/

      # ─── Upload IPA ────────────────────────────────────────────────────────
      - name: ⬆️ Upload IPA artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: artifacts/ipa/
          retention-days: 30

      # ─── Upload Debug Symbols ──────────────────────────────────────────────
      - name: ⬆️ Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-info-${{ github.sha }}
          path: build/debug-info/
          retention-days: 30

      # ─── Clean up keychain ─────────────────────────────────────────────────
      - name: 🧹 Clean up keychain
        if: always() && github.event_name != 'pull_request'
        run: |
          if security list-keychains | grep -q "app-signing"; then
            security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          fi

      # ─── GitHub Release (on tag push) ──────────────────────────────────────
      - name: 🚀 Create GitHub Release (iOS)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: schat ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/ipa/*.ipa
          body: |
            ## 📱 schat iOS Release ${{ github.ref_name }}

            ### Downloads
            - **IPA** file for TestFlight / Ad-Hoc distribution

            ### Installation
            - For **TestFlight**: Upload IPA via Xcode Organizer or `xcrun altool`
            - For **Ad-Hoc**: Install via Apple Configurator or your MDM

            ### What's Changed
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.sha }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
